<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Ex - Binary Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Strict Dark Mode Base */
        body { 
            background-color: #000000 !important; 
            color: #EAECEF !important; 
            font-family: 'Inter', sans-serif;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #2B3139; border-radius: 4px; }

        /* Row Styling */
        .asset-row { border-bottom: 1px solid #14151A; transition: background-color 0.2s; }
        .asset-row:hover { background-color: #0A0B0D; }
        .asset-row:last-child { border-bottom: none; }
        
        /* Badges & Tabular Numbers */
        .change-badge { width: 76px; text-align: center; border-radius: 4px; padding: 6px 0; font-weight: 700; font-size: 13px; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        .asset-price { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
        
        /* Orbitron Logo Font */
        .logo-text { font-family: 'Orbitron', sans-serif; }

        /* Connection Status Dot */
        .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .conn-dot.connected { background: #0ECB81; box-shadow: 0 0 6px rgba(14,203,129,0.5); }
        .conn-dot.disconnected { background: #F6465D; box-shadow: 0 0 6px rgba(246,70,93,0.5); }
        .conn-dot.connecting { background: #F59E0B; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.4; } }

        /* Live Price Flashing Animations */
        @keyframes flash-up { 0%,100% { background-color: transparent; } 50% { background-color: rgba(14,203,129,0.15); } }
        @keyframes flash-down { 0%,100% { background-color: transparent; } 50% { background-color: rgba(246,70,93,0.15); } }
        .price-up { animation: flash-up 0.6s ease-out; }
        .price-down { animation: flash-down 0.6s ease-out; }

        /* Tabs */
        .tab-btn { color: #848E9C; padding-bottom: 8px; font-weight: 500; font-size: 14px; position: relative; transition: color 0.2s; }
        .tab-btn.active { color: #EAECEF; font-weight: 600; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
            height: 2px; background-color: #EAECEF;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

    <!-- AUTH CHECK -->
    <script>
        if (!localStorage.getItem('authToken')) window.location.href = '/login.html';
    </script>

    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden md:flex flex-col w-64 border-r border-[#2B3139] bg-[#000000] z-20">
        <div class="h-20 flex items-center px-6 border-b border-[#2B3139]">
            <span class="logo-text text-2xl font-black tracking-wider text-white">NOVA<span class="text-[#0ECB81]">EX</span></span>
        </div>
        <nav class="flex-1 py-6 px-4 space-y-1">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-[#14151A] text-[#EAECEF] rounded-md font-semibold"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg> Dashboard</a>
            <a href="trade.html" class="flex items-center gap-3 px-4 py-3 text-[#848E9C] hover:bg-[#14151A] hover:text-white rounded-md transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg> Trade</a>
            <a href="deposit.html" class="flex items-center gap-3 px-4 py-3 text-[#848E9C] hover:bg-[#14151A] hover:text-white rounded-md transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg> Deposit</a>
            <a href="withdraw.html" class="flex items-center gap-3 px-4 py-3 text-[#848E9C] hover:bg-[#14151A] hover:text-white rounded-md transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H4a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg> Wallet</a>
            <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-[#848E9C] hover:bg-[#14151A] hover:text-white rounded-md transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg> Profile</a>
        </nav>
    </aside>

    <!-- MAIN SCROLLABLE CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-y-auto relative pb-20 md:pb-0">
        
        <div class="max-w-5xl mx-auto w-full">
            
            <!-- HEADER -->
            <header class="px-4 py-6 md:px-8 border-b border-[#14151A]">
                
                <!-- MOBILE LOGO -->
                <div class="flex justify-center items-center w-full mb-8 md:hidden">
                    <span class="logo-text text-[26px] font-black tracking-wider text-white">NOVA<span class="text-[#0ECB81]">EX</span></span>
                </div>

                <div class="flex items-end justify-between mb-6 mt-2 md:mt-0">
                    <div>
                        <div class="flex items-center gap-3 mb-1">
                            <span class="text-[#848E9C] text-sm font-medium">Total Balance (USD)</span>
                            <div class="flex items-center gap-2 bg-[#14151A] px-2 py-1 rounded border border-[#2B3139]">
                                <span class="conn-dot connecting" id="conn-dot"></span>
                                <span class="text-[10px] font-semibold text-[#EAECEF] uppercase tracking-wider" id="conn-text">Connecting</span>
                            </div>
                        </div>
                        <div id="balance-display" class="text-4xl md:text-5xl font-bold tracking-tight text-[#EAECEF] font-mono">
                            <span class="value">Loading...</span>
                        </div>
                    </div>
                    <div class="text-right" id="pnl-display" data-pnl-value="0">
                        <div class="text-[11px] text-[#848E9C] mb-1 uppercase tracking-wider">Today's P&L</div>
                        <div class="value text-sm font-bold font-mono text-[#848E9C]">...</div>
                    </div>
                </div>

                <!-- PRIMARY ACTIONS -->
                <div class="flex gap-3">
                    <a href="deposit.html" class="flex-1 bg-[#EAECEF] hover:bg-white text-black py-3 rounded text-center font-bold text-[14px] transition-colors">Deposit</a>
                    <a href="withdraw.html" class="flex-1 bg-[#14151A] hover:bg-[#1F222A] text-[#EAECEF] py-3 rounded text-center font-bold text-[14px] transition-colors border border-[#2B3139]">Withdraw</a>
                </div>
            </header>

            <div class="px-4 md:px-8 py-4">
                
                <!-- SEARCH & TABS -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-2 border-b border-[#14151A]">
                    <div class="flex gap-6" id="tab-container">
                        <button class="tab-btn active" data-sort="hot">Hot</button>
                        <button class="tab-btn" data-sort="gainers">Gainers</button>
                        <button class="tab-btn" data-sort="24h">24H Vol</button>
                    </div>
                    <div class="relative w-full md:w-64 pb-2 md:pb-0">
                        <svg class="w-4 h-4 text-[#848E9C] absolute left-3 top-1/2 -translate-y-1/2 md:-translate-y-full md:mt-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <input type="text" id="search-box" placeholder="Search markets..." class="w-full bg-[#14151A] border border-[#2B3139] rounded py-1.5 pl-9 pr-3 text-sm text-[#EAECEF] focus:outline-none focus:border-[#848E9C]">
                    </div>
                </div>

                <!-- LIST HEADER -->
                <div class="flex justify-between py-3 text-[11px] text-[#848E9C] font-medium uppercase tracking-wider mb-1">
                    <div class="w-1/2">Market</div>
                    <div class="w-1/4 text-right">Price</div>
                    <div class="w-1/4 text-right">24h Chg%</div>
                </div>

                <!-- DYNAMIC ASSETS -->
                <div id="assets-content" class="pb-6">
                    <div class="text-center py-10 text-[#848E9C] text-sm">Initializing terminal...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="md:hidden fixed bottom-0 w-full bg-[#000000] border-t border-[#14151A] flex justify-between items-center px-4 py-2 pb-safe z-50">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 p-2 text-[#EAECEF]">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="trade.html" class="flex flex-col items-center gap-1 p-2 text-[#848E9C] hover:text-[#EAECEF]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[10px] font-medium">Trade</span>
        </a>
        <a href="deposit.html" class="flex flex-col items-center gap-1 p-2 text-[#848E9C] hover:text-[#EAECEF]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span class="text-[10px] font-medium">Deposit</span>
        </a>
        <a href="withdraw.html" class="flex flex-col items-center gap-1 p-2 text-[#848E9C] hover:text-[#EAECEF]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H4a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
            <span class="text-[10px] font-medium">Wallet</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 p-2 text-[#848E9C] hover:text-[#EAECEF]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>

    <!-- ORIGINAL JAVASCRIPT LOGIC -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('authToken');
        let lastPrices = {};
        let allAssets = [];

        const balanceDisplay = document.getElementById('balance-display');
        const pnlDisplay = document.getElementById('pnl-display');
        const assetsContent = document.getElementById('assets-content');
        const searchBox = document.getElementById('search-box');
        const tabContainer = document.getElementById('tab-container');
        const connDot = document.getElementById('conn-dot');
        const connText = document.getElementById('conn-text');

        // ---- CONNECTION STATUS ----
        function setConnectionStatus(state) {
            connDot.className = `conn-dot ${state}`;
            connText.textContent = state === 'connected' ? 'Live' : state === 'connecting' ? 'Connecting...' : 'Offline';
            connText.style.color = state === 'connected' ? '#0ECB81' : state === 'connecting' ? '#F59E0B' : '#F6465D';
        }

        // ---- PNL STORAGE ----
        const savePnl = (val) => {
            localStorage.setItem('todayPnl', val.toString());
            localStorage.setItem('pnlDate', new Date().toDateString());
        };
        const loadPnl = () => {
            if (localStorage.getItem('pnlDate') === new Date().toDateString()) {
                return parseFloat(localStorage.getItem('todayPnl')) || 0;
            }
            localStorage.setItem('todayPnl', '0');
            localStorage.setItem('pnlDate', new Date().toDateString());
            return 0;
        };

        // ---- UPDATE PNL DISPLAY ----
        const updatePnlDisplay = (val) => {
            const n = parseFloat(val);
            const elem = pnlDisplay.querySelector('.value');
            const sign = n > 0 ? '+' : '';
            const color = n > 0 ? '#0ECB81' : n < 0 ? '#F6465D' : '#848E9C';
            elem.textContent = sign + n.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
            elem.style.color = color;
        };

        // ---- RENDER ASSET LIST ----
        const renderAssetList = (assets) => {
            assetsContent.innerHTML = '';
            if (!assets || assets.length === 0) {
                assetsContent.innerHTML = `<div class="text-center py-10 text-[#848E9C] text-sm">No assets found.</div>`;
                return;
            }

            assets.forEach(asset => {
                const tickerParts = asset.ticker.split('/');
                const base = tickerParts[0];
                const quote = tickerParts[1] || 'USD';
                
                const isUp = asset.change >= 0;
                const changeClass = isUp ? 'bg-[#0ECB81]' : 'bg-[#F6465D]';
                const textClass = isUp ? 'text-[#0ECB81]' : 'text-[#F6465D]';
                const sign = isUp ? '+' : '';
                const cardId = `asset-card-${asset.ticker.replace('/', '-')}`;

                const row = document.createElement('a');
                row.href = 'trade.html';
                row.id = cardId;
                row.className = 'asset-row flex justify-between items-center py-4 -mx-4 px-4';
                row.setAttribute('data-name', `${base.toLowerCase()} ${asset.name.toLowerCase()}`);
                row.setAttribute('data-change', asset.change);

                row.innerHTML = `
                    <div class="w-1/2 flex items-center">
                        <div>
                            <div class="font-bold text-[#EAECEF] text-[15px]">${base}<span class="text-xs text-[#848E9C] font-normal">/${quote}</span></div>
                            <div class="text-[11px] text-[#848E9C] font-medium mt-0.5">${asset.name}</div>
                        </div>
                    </div>
                    <div class="w-1/4 text-right">
                        <div class="asset-price font-bold ${textClass} text-[15px]">
                            ${asset.price.toLocaleString('en-US', { style:'currency', currency:'USD', minimumFractionDigits:2, maximumFractionDigits:5 }).replace('$', '')}
                        </div>
                    </div>
                    <div class="w-1/4 flex justify-end">
                        <div class="change-badge asset-change ${changeClass}">
                            ${sign}${asset.change.toFixed(2)}%
                        </div>
                    </div>
                `;
                assetsContent.appendChild(row);
                lastPrices[asset.ticker] = asset.price;
            });
        };

        // ---- RENDER DASHBOARD DATA ----
        const renderData = (data) => {
            balanceDisplay.querySelector('.value').textContent =
                data.balance.toLocaleString('en-US', { style: 'currency', currency: 'USD' });

            const pnl = data.todayPnl !== undefined ? data.todayPnl : loadPnl();
            pnlDisplay.dataset.pnlValue = pnl;
            updatePnlDisplay(pnl);
            savePnl(pnl);

            allAssets = data.assets || [];
            renderAssetList(allAssets);
        };

        // ---- SOCKET CONFIGURATION ----
        const socket = io({
            auth: { token },
            transports: ['websocket', 'polling'],
            pingInterval: 10000,
            pingTimeout: 15000,
            reconnectionDelay: 5000,
            reconnectionDelayMax: 10000
        });

        socket.on('connect', () => {
            setConnectionStatus('connected');
            socket.emit('request_dashboard_data');
        });
        
        socket.on('disconnect', () => setConnectionStatus('disconnected'));
        
        socket.on('connect_error', (err) => {
            setConnectionStatus('disconnected');
            if (err.message.toLowerCase().includes('auth') || err.message.toLowerCase().includes('token')) {
                setTimeout(() => window.location.href = '/login.html', 2000);
            }
        });

        socket.on('dashboard_data', (data) => {
            if (data?.success) {
                renderData(data.data);
            } else {
                assetsContent.innerHTML = `<div class="text-center py-10 text-[#F6465D] text-sm">Could not load data. Please refresh.</div>`;
            }
        });

        socket.on('dashboard_price_update', (updates) => {
            allAssets.forEach(asset => {
                if (updates[asset.ticker]) {
                    asset.price = updates[asset.ticker].price;
                    asset.change = updates[asset.ticker].change;
                }
            });

            for (const ticker in updates) {
                const cardId = `asset-card-${ticker.replace('/', '-')}`;
                const row = document.getElementById(cardId);
                if (!row) continue;

                const newPrice = updates[ticker].price;
                const newChange = updates[ticker].change;
                const isUp = newChange >= 0;

                row.setAttribute('data-change', newChange);

                // Flash Animation
                if (lastPrices[ticker] !== undefined && newPrice !== lastPrices[ticker]) {
                    row.classList.remove('price-up', 'price-down');
                    void row.offsetWidth; // Trigger reflow
                    row.classList.add(newPrice > lastPrices[ticker] ? 'price-up' : 'price-down');
                }

                const priceElem = row.querySelector('.asset-price');
                const changeElem = row.querySelector('.asset-change');

                // Update text and color
                priceElem.textContent = newPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 5 });
                priceElem.className = `asset-price font-bold text-[15px] ${isUp ? 'text-[#0ECB81]' : 'text-[#F6465D]'}`;

                const sign = isUp ? '+' : '';
                changeElem.textContent = `${sign}${newChange.toFixed(2)}%`;
                changeElem.className = `change-badge asset-change ${isUp ? 'bg-[#0ECB81]' : 'bg-[#F6465D]'}`;
                
                lastPrices[ticker] = newPrice;
            }
        });

        socket.on('trade_result', (data) => {
            if (data.balance !== undefined) {
                balanceDisplay.querySelector('.value').textContent =
                    data.balance.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
            }
            const pnl = data.todayPnl !== undefined ? data.todayPnl : loadPnl();
            updatePnlDisplay(pnl);
            savePnl(pnl);
        });

        // ---- SEARCH ----
        searchBox.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.asset-row').forEach(row => {
                row.style.display = row.getAttribute('data-name').includes(q) ? 'flex' : 'none';
            });
        });

        // ---- TABS ----
        tabContainer.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') return;
            tabContainer.querySelector('.active').classList.remove('active');
            e.target.classList.add('active');

            const sort = e.target.getAttribute('data-sort');
            let sorted = [...allAssets];
            if (sort === 'gainers') sorted.sort((a, b) => b.change - a.change);

            renderAssetList(sorted);

            // Re-apply search filter if active
            const q = searchBox.value.toLowerCase();
            if (q) {
                document.querySelectorAll('.asset-row').forEach(row => {
                    if (!row.getAttribute('data-name').includes(q)) row.style.display = 'none';
                });
            }
        });

        // ---- AUTO REFRESH ----
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) socket.emit('request_dashboard_data');
        });
        setInterval(() => socket.emit('request_dashboard_data'), 30000);

        // ---- INITIAL PNL ----
        const initPnl = loadPnl();
        if (initPnl !== 0) updatePnlDisplay(initPnl);
    });
    </script>
</body>
</html>
