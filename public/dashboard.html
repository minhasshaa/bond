<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TradePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050b18;
            --bg-secondary: #0a1628;
            --bg-card: #0d1f3c;
            --accent-blue: #3b82f6;
            --accent-gold: #f59e0b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: rgba(59, 130, 246, 0.15);
            --text-primary: #f0f4ff;
            --text-secondary: #8899bb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding-bottom: 90px;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 0%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
        }

        /* ---- SCROLLBAR ---- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 2px; }

        /* ---- GLASS CARD ---- */
        .glass-card {
            background: rgba(13, 31, 60, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
        }

        /* ---- HEADER BALANCE CARD ---- */
        .balance-card {
            background: linear-gradient(135deg, #0d1f3c 0%, #0a1628 50%, #050b18 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .balance-card::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ---- QUICK ACTION BUTTONS ---- */
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: transform 0.2s ease;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .action-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        /* ---- SEARCH BOX ---- */
        .search-box {
            background: rgba(13, 31, 60, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 16px 12px 44px;
            color: var(--text-primary);
            width: 100%;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }
        .search-box:focus { border-color: rgba(59, 130, 246, 0.5); }
        .search-box::placeholder { color: var(--text-secondary); }

        /* ---- TAB PILLS ---- */
        .tab-container {
            background: rgba(13, 31, 60, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 4px;
            display: flex;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* ---- ASSET ROW ---- */
        .asset-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(13, 31, 60, 0.4);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
        }
        .asset-row:hover {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }
        .asset-row:active { transform: scale(0.99); }

        .asset-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--accent-blue);
            overflow: hidden;
        }

        .badge-up {
            background: rgba(16, 185, 129, 0.12);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-down {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ---- BOTTOM NAV ---- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 10px 0 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            flex: 1;
            transition: all 0.2s;
            position: relative;
            padding: 4px 0;
        }
        .nav-item svg { width: 22px; height: 22px; transition: all 0.2s; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item.active svg { color: var(--accent-blue); }
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 0 0 4px 4px;
        }

        /* ---- PROMO BANNER ---- */
        .promo-banner {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2444 50%, #0a1628 100%);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .promo-banner::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
        }

        /* ---- SKELETON ---- */
        .skeleton {
            background: linear-gradient(90deg, rgba(13,31,60,0.8) 25%, rgba(59,130,246,0.05) 50%, rgba(13,31,60,0.8) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ---- PRICE FLASH ---- */
        @keyframes flash-up { 0%,100% { background-color: transparent; } 50% { background-color: rgba(16,185,129,0.12); } }
        @keyframes flash-down { 0%,100% { background-color: transparent; } 50% { background-color: rgba(239,68,68,0.12); } }
        .price-up { animation: flash-up 0.8s ease-out; }
        .price-down { animation: flash-down 0.8s ease-out; }

        @keyframes pnl-pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        .pnl-update { animation: pnl-pop 0.5s ease; }

        /* ---- CONNECTION DOT ---- */
        .conn-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .conn-dot.connected { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
        .conn-dot.disconnected { background: var(--accent-red); }
        .conn-dot.connecting { background: var(--accent-gold); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.4; } }

        /* ---- SECTION LABEL ---- */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('authToken')) window.location.href = '/login.html';
    </script>

    <div class="container mx-auto px-4 pt-6 max-w-lg">

        <!-- ===== HEADER ===== -->
        <header class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-xs text-gray-500 font-medium">Welcome back</p>
                    <p class="text-lg font-700 text-white" id="username-display">...</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="conn-dot connecting" id="conn-dot"></span>
                    <span class="text-xs text-gray-500" id="conn-text">Connecting...</span>
                </div>
            </div>

            <!-- Balance Card -->
            <div class="balance-card p-6">
                <!-- Skeleton -->
                <div id="header-skeleton">
                    <div class="skeleton h-4 w-24 mb-3"></div>
                    <div class="skeleton h-10 w-48 mb-2"></div>
                    <div class="skeleton h-4 w-32"></div>
                </div>

                <div id="header-content" class="hidden">
                    <p class="section-label mb-2">Total Balance</p>
                    <div id="balance-display" class="text-4xl font-800 text-white mb-2 tracking-tight">
                        <span class="value">$0.00</span>
                    </div>
                    <div id="pnl-display" class="flex items-center gap-2" data-pnl-value="0">
                        <span class="text-xs text-gray-500">Today's P&L</span>
                        <span class="value text-sm font-600 text-gray-400">...</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- ===== QUICK ACTIONS ===== -->
        <div class="grid grid-cols-4 gap-3 mb-6">
            <a href="deposit.html" class="action-btn">
                <div class="action-icon" style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);">
                    <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>

            <a href="withdraw.html" class="action-btn">
                <div class="action-icon" style="background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                </div>
                <span class="text-xs font-500 text-gray-400">Withdraw</span>
            </a>
            <a href="trade.html" class="action-btn">
                <div class="action-icon" style="background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);">
                    <svg class="w-6 h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                    </svg>
                </div>
                <span class="text-xs font-500 text-gray-400">Trade</span>
            </a>
            <a href="profile.html" class="action-btn">
                <div class="action-icon" style="background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2);">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
                <span class="text-xs font-500 text-gray-400">Profile</span>
            </a>
        </div>

        <!-- ===== PROMO BANNER ===== -->
        <div class="promo-banner mb-6">
            <div class="relative z-10">
                <p class="text-xs font-600 text-blue-400 uppercase tracking-wider mb-1">Platform Update</p>
                <h3 class="text-base font-700 text-white mb-1">Stay Informed</h3>
                <p class="text-xs text-gray-400 leading-relaxed">Get the latest news and updates<br>from our platform.</p>
            </div>
            <div class="relative z-10 opacity-20">
                <svg class="w-20 h-20 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
        </div>

        <!-- ===== SEARCH ===== -->
        <div class="relative mb-4">
            <svg class="w-4 h-4 text-gray-500 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" id="search-box" placeholder="Search assets..." class="search-box">
        </div>

        <!-- ===== TABS ===== -->
        <div class="tab-container mb-4" id="tab-container">
            <button class="tab-btn active" data-sort="hot">🔥 Hot</button>
            <button class="tab-btn" data-sort="gainers">📈 Gainers</button>
            <button class="tab-btn" data-sort="24h">🕐 24H</button>
        </div>

        <!-- ===== ASSET LIST ===== -->
        <div class="mb-2 flex items-center justify-between">
            <span class="section-label">Markets</span>
            <span class="text-xs text-gray-600" id="asset-count"></span>
        </div>

        <div id="assets-skeleton" class="space-y-3">
            <div class="skeleton h-16 w-full"></div>
            <div class="skeleton h-16 w-full"></div>
            <div class="skeleton h-16 w-full"></div>
            <div class="skeleton h-16 w-full"></div>
            <div class="skeleton h-16 w-full"></div>
        </div>

        <div id="assets-content" class="space-y-3"></div>

    </div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active" id="nav-dashboard">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span>Home</span>
        </a>
        <a href="trade.html" class="nav-item" id="nav-trade">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
            </svg>
            <span>Trade</span>
        </a>
        <a href="deposit.html" class="nav-item" id="nav-deposit">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span>Deposit</span>
        </a>
        <a href="withdraw.html" class="nav-item" id="nav-withdraw">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H4a3 3 0 00-3 3v8a3 3 0 003 3z"/>
            </svg>
            <span>Wallet</span>
        </a>
        <a href="profile.html" class="nav-item" id="nav-profile">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span>Profile</span>
        </a>
    </nav>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('authToken');
        let lastPrices = {};
        let allAssets = [];

        const usernameDisplay = document.getElementById('username-display');
        const balanceDisplay = document.getElementById('balance-display');
        const pnlDisplay = document.getElementById('pnl-display');
        const headerSkeleton = document.getElementById('header-skeleton');
        const headerContent = document.getElementById('header-content');
        const assetsContent = document.getElementById('assets-content');
        const assetsSkeleton = document.getElementById('assets-skeleton');
        const searchBox = document.getElementById('search-box');
        const tabContainer = document.getElementById('tab-container');
        const assetCount = document.getElementById('asset-count');
        const connDot = document.getElementById('conn-dot');
        const connText = document.getElementById('conn-text');

        // ---- CONNECTION STATUS ----
        function setConnectionStatus(state) {
            connDot.className = `conn-dot ${state}`;
            connText.textContent = state === 'connected' ? 'Live' : state === 'connecting' ? 'Connecting...' : 'Disconnected';
            connText.style.color = state === 'connected' ? '#10b981' : state === 'connecting' ? '#f59e0b' : '#ef4444';
        }

        // ---- PNL STORAGE ----
        const savePnl = (val) => {
            localStorage.setItem('todayPnl', val.toString());
            localStorage.setItem('pnlDate', new Date().toDateString());
        };
        const loadPnl = () => {
            if (localStorage.getItem('pnlDate') === new Date().toDateString()) {
                return parseFloat(localStorage.getItem('todayPnl')) || 0;
            }
            localStorage.setItem('todayPnl', '0');
            localStorage.setItem('pnlDate', new Date().toDateString());
            return 0;
        };

        // ---- UPDATE PNL DISPLAY ----
        const updatePnlDisplay = (val) => {
            const n = parseFloat(val);
            const elem = pnlDisplay.querySelector('.value');
            const sign = n > 0 ? '+' : '';
            const color = n > 0 ? '#10b981' : n < 0 ? '#ef4444' : '#8899bb';
            elem.textContent = sign + n.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
            elem.style.color = color;
            pnlDisplay.classList.remove('pnl-update');
            void pnlDisplay.offsetWidth;
            pnlDisplay.classList.add('pnl-update');
        };

        // ---- RENDER ASSET LIST ----
        const renderAssetList = (assets) => {
            assetsContent.innerHTML = '';
            if (!assets || assets.length === 0) {
                assetsContent.innerHTML = `<div class="text-center py-10 text-gray-600 text-sm">No assets found.</div>`;
                assetCount.textContent = '';
                return;
            }

            assetCount.textContent = `${assets.length} pairs`;

            assets.forEach(asset => {
                const tickerBase = asset.ticker.split('/')[0];
                const isUp = asset.change >= 0;
                const changeSign = isUp ? '+' : '';
                const cardId = `asset-card-${asset.ticker.replace('/', '-')}`;

                const row = document.createElement('a');
                row.href = 'trade.html';
                row.id = cardId;
                row.className = 'asset-row';
                row.setAttribute('data-name', `${tickerBase.toLowerCase()} ${asset.name.toLowerCase()}`);
                row.setAttribute('data-change', asset.change);

                row.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="asset-icon">
                            <img src="/icons/${tickerBase.toLowerCase()}.svg" alt="${tickerBase}"
                                style="width:28px;height:28px;"
                                onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                            <span style="display:none;">${tickerBase.charAt(0)}</span>
                        </div>
                        <div>
                            <p style="font-weight:700; font-size:15px; color:#f0f4ff;">${tickerBase}</p>
                            <p style="font-size:12px; color:#8899bb; margin-top:2px;">${asset.name}</p>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <p class="asset-price" style="font-weight:600; font-size:15px; color:#f0f4ff;">
                            ${asset.price.toLocaleString('en-US', { style:'currency', currency:'USD', minimumFractionDigits:2, maximumFractionDigits:5 })}
                        </p>
                        <span class="${isUp ? 'badge-up' : 'badge-down'} asset-change" style="margin-top:4px; display:inline-block;">
                            ${changeSign}${asset.change.toFixed(2)}%
                        </span>
                    </div>
                `;
                assetsContent.appendChild(row);
                lastPrices[asset.ticker] = asset.price;
            });
        };

        // ---- RENDER DASHBOARD DATA ----
        const renderData = (data) => {
            usernameDisplay.textContent = data.username;
            balanceDisplay.querySelector('.value').textContent =
                data.balance.toLocaleString('en-US', { style: 'currency', currency: 'USD' });

            const pnl = data.todayPnl !== undefined ? data.todayPnl : loadPnl();
            pnlDisplay.dataset.pnlValue = pnl;
            updatePnlDisplay(pnl);
            savePnl(pnl);

            allAssets = data.assets || [];
            renderAssetList(allAssets);

            headerSkeleton.style.display = 'none';
            headerContent.classList.remove('hidden');
            assetsSkeleton.style.display = 'none';
        };

        // ---- SOCKET ----
        const socket = io({
            auth: { token },
            transports: ['websocket', 'polling'],
            pingInterval: 10000,
            pingTimeout: 15000,
            reconnectionDelay: 5000,
            reconnectionDelayMax: 10000
        });

        socket.on('connect', () => {
            setConnectionStatus('connected');
            socket.emit('request_dashboard_data');
        });
        socket.on('disconnect', () => setConnectionStatus('disconnected'));
        socket.on('connect_error', (err) => {
            setConnectionStatus('disconnected');
            if (err.message.toLowerCase().includes('auth') || err.message.toLowerCase().includes('token')) {
                setTimeout(() => window.location.href = '/login.html', 2000);
            }
        });

        socket.on('dashboard_data', (data) => {
            if (data?.success) {
                renderData(data.data);
            } else {
                assetsContent.innerHTML = `<div class="text-center py-10 text-red-400 text-sm">Could not load data. Please refresh.</div>`;
                assetsSkeleton.style.display = 'none';
            }
        });

        socket.on('dashboard_price_update', (updates) => {
            allAssets.forEach(asset => {
                if (updates[asset.ticker]) {
                    asset.price = updates[asset.ticker].price;
                    asset.change = updates[asset.ticker].change;
                }
            });

            for (const ticker in updates) {
                const cardId = `asset-card-${ticker.replace('/', '-')}`;
                const row = document.getElementById(cardId);
                if (!row) continue;

                const newPrice = updates[ticker].price;
                const newChange = updates[ticker].change;
                const isUp = newChange >= 0;

                row.setAttribute('data-change', newChange);

                if (lastPrices[ticker] !== undefined && newPrice !== lastPrices[ticker]) {
                    row.classList.remove('price-up', 'price-down');
                    void row.offsetWidth;
                    row.classList.add(newPrice > lastPrices[ticker] ? 'price-up' : 'price-down');
                }

                const priceElem = row.querySelector('.asset-price');
                const changeElem = row.querySelector('.asset-change');

                priceElem.textContent = newPrice.toLocaleString('en-US', {
                    style: 'currency', currency: 'USD',
                    minimumFractionDigits: 2, maximumFractionDigits: 5
                });

                const sign = isUp ? '+' : '';
                changeElem.textContent = `${sign}${newChange.toFixed(2)}%`;
                changeElem.className = `${isUp ? 'badge-up' : 'badge-down'} asset-change`;
                lastPrices[ticker] = newPrice;
            }
        });

        socket.on('trade_result', (data) => {
            if (data.balance !== undefined) {
                balanceDisplay.querySelector('.value').textContent =
                    data.balance.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
            }
            const pnl = data.todayPnl !== undefined ? data.todayPnl : loadPnl();
            updatePnlDisplay(pnl);
            savePnl(pnl);
        });

        // ---- SEARCH ----
        searchBox.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.asset-row').forEach(row => {
                row.style.display = row.getAttribute('data-name').includes(q) ? 'flex' : 'none';
            });
        });

        // ---- TABS ----
        tabContainer.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') return;
            tabContainer.querySelector('.active').classList.remove('active');
            e.target.classList.add('active');

            const sort = e.target.getAttribute('data-sort');
            let sorted = [...allAssets];
            if (sort === 'gainers') sorted.sort((a, b) => b.change - a.change);

            renderAssetList(sorted);

            const q = searchBox.value.toLowerCase();
            if (q) {
                document.querySelectorAll('.asset-row').forEach(row => {
                    if (!row.getAttribute('data-name').includes(q)) row.style.display = 'none';
                });
            }
        });

        // ---- AUTO REFRESH ----
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) socket.emit('request_dashboard_data');
        });
        setInterval(() => socket.emit('request_dashboard_data'), 30000);

        // ---- INITIAL PNL ----
        const initPnl = loadPnl();
        if (initPnl !== 0) updatePnlDisplay(initPnl);
    });
    </script>
</body>
</html>
