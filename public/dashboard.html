<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Trading App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00d4aa;
            --neon-dim: #00d4aa30;
            --neon-glow: 0 0 12px #00d4aa60;
            --bg: #080d14;
            --card: #0d1520;
            --border: #0f1e2e;
            --text-dim: #3a5068;
            --red: #ff4d6d;
            --red-dim: #ff4d6d20;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #e2e8f0;
            padding-bottom: 72px;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 20%, #00d4aa08 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #00406030 0%, transparent 50%);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--neon-dim); border-radius: 4px; }

        /* ===== TOP HEADER BAR ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8, 13, 20, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-bar-logo {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--neon);
            text-shadow: var(--neon-glow);
        }
        .top-bar-logo span { color: #fff; }
        .top-bar-right { display: flex; align-items: center; gap: 10px; }
        .welcome-text { font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; }
        .username-badge {
            font-size: 12px;
            font-weight: 700;
            color: var(--neon);
            background: var(--neon-dim);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid #00d4aa40;
            letter-spacing: 0.05em;
        }

        /* ===== MAIN CONTENT ===== */
        .main-wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ===== BALANCE CARD ===== */
        .balance-card {
            background: linear-gradient(135deg, #0a1a14 0%, #0a1020 100%);
            border: 1px solid #00d4aa25;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, #00d4aa12 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .balance-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 1px;
            background: linear-gradient(90deg, var(--neon), transparent);
            opacity: 0.3;
        }
        .bal-label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .bal-amount-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
        .bal-currency { font-size: 18px; color: var(--neon); font-family: 'Space Mono', monospace; }
        #balance-display {
            font-family: 'Space Mono', monospace;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }
        #pnl-display {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.04em;
        }
        #pnl-display .pnl-arrow { font-size: 10px; }

        .conn-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
        #connection-status { display: flex; align-items: center; gap: 5px; }
        .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
        .conn-dot.live { background: var(--neon); box-shadow: 0 0 6px var(--neon); animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
        .conn-text { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }

        /* ===== SKELETON ===== */
        .skeleton {
            background: linear-gradient(90deg, var(--card) 25%, #12202e 50%, var(--card) 75%);
            background-size: 200% 100%;
            border-radius: 8px;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ===== QUICK ACTIONS ===== */
        .actions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 6px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-dim);
            transition: all 0.2s;
            cursor: pointer;
        }
        .action-btn:hover {
            border-color: var(--neon);
            color: var(--neon);
            box-shadow: inset 0 0 20px #00d4aa08;
        }
        .action-btn svg { width: 22px; height: 22px; }
        .action-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
        .action-btn.dep svg { color: var(--neon); }
        .action-btn.with svg { color: #60a5fa; }
        .action-btn.trade svg { color: #facc15; }
        .action-btn.profile svg { color: #f87171; }

        /* ===== BANNER ===== */
        .banner {
            background: linear-gradient(135deg, #0a2a1e 0%, #091a2a 100%);
            border: 1px solid #00d4aa20;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .banner::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 100px; height: 100px;
            background: radial-gradient(circle, #00d4aa15 0%, transparent 70%);
        }
        .banner-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .banner-sub { font-size: 11px; color: var(--text-dim); }
        .banner-icon { font-size: 28px; opacity: 0.5; }

        /* ===== SEARCH ===== */
        .search-wrap { position: relative; margin-bottom: 14px; }
        #search-box {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            color: #e2e8f0;
            border-radius: 12px;
            padding: 10px 14px 10px 42px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            letter-spacing: 0.04em;
            outline: none;
            transition: border-color 0.2s;
        }
        #search-box:focus { border-color: var(--neon); box-shadow: 0 0 0 2px #00d4aa15; }
        #search-box::placeholder { color: var(--text-dim); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); width: 16px; height: 16px; }

        /* ===== TABS ===== */
        #tab-container {
            display: flex;
            gap: 0;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .tab-link {
            flex: 1;
            padding: 10px 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-link:hover { color: #6b8fa8; }
        .tab-link.active { color: var(--neon); border-bottom-color: var(--neon); text-shadow: 0 0 8px #00d4aa50; }

        /* ===== ASSET ROWS ===== */
        #assets-content { display: flex; flex-direction: column; }
        .asset-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            transition: background 0.15s;
            border-radius: 8px;
            cursor: pointer;
        }
        .asset-row:hover { background: #0d1520aa; }
        .asset-left { display: flex; align-items: center; gap: 12px; }
        .asset-icon-wrap { position: relative; }
        .asset-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            background: var(--card);
            border: 1px solid var(--border);
        }
        .asset-icon img { width: 24px; height: 24px; }
        .asset-name { font-size: 15px; font-weight: 700; color: #e2e8f0; letter-spacing: 0.03em; }
        .asset-fullname { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; margin-top: 1px; }
        .asset-right { text-align: right; }
        .asset-price { font-family: 'Space Mono', monospace; font-size: 13px; color: #cbd5e1; }
        .asset-change { font-size: 12px; font-weight: 700; margin-top: 2px; letter-spacing: 0.04em; }
        .change-up { color: var(--neon); }
        .change-down { color: var(--red); }

        /* price flash */
        @keyframes flash-up { 0%,100% { background: transparent; } 40% { background: #00d4aa12; } }
        @keyframes flash-down { 0%,100% { background: transparent; } 40% { background: #ff4d6d10; } }
        .price-up { animation: flash-up 0.8s ease; }
        .price-down { animation: flash-down 0.8s ease; }

        @keyframes pnl-update { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        .pnl-update { animation: pnl-update 0.5s ease; }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: rgba(8,13,20,0.97);
            border-top: 1px solid var(--border);
            padding: 8px 0 10px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            flex: 1;
            transition: color 0.2s;
        }
        .nav-link svg { width: 22px; height: 22px; }
        .nav-link.active { color: var(--neon); }
        .nav-link.active svg { filter: drop-shadow(0 0 4px #00d4aa80); }
        .nav-active-bar {
            width: 20px; height: 2px;
            background: var(--neon);
            border-radius: 2px;
            box-shadow: var(--neon-glow);
        }
    </style>
</head>
<body>

    <script>
        const token = localStorage.getItem('authToken');
        if (!token) { window.location.href = '/login.html'; }
    </script>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-logo">TRADE<span>X</span></div>
        <div class="top-bar-right">
            <span class="welcome-text">WELCOME</span>
            <span class="username-badge" id="username-display">...</span>
        </div>
    </div>

    <div class="main-wrap">

        <!-- BALANCE CARD -->
        <div id="header-skeleton" class="skeleton" style="height:110px; margin-bottom:16px;"></div>

        <div id="header-content" class="balance-card" style="display:none;">
            <div class="bal-label">Total Portfolio Balance</div>
            <div class="bal-amount-row">
                <span class="bal-currency">$</span>
                <div id="balance-display">0.00</div>
            </div>
            <div id="pnl-display" data-pnl-value="0">
                <span class="pnl-arrow">▶</span>
                <span style="color: var(--text-dim); font-size:11px; letter-spacing:0.1em;">TODAY'S P&L</span>
                <span class="value" style="font-weight:700;">...</span>
            </div>
            <div class="conn-row">
                <div id="connection-status">
                    <span class="conn-dot"></span>
                    <span class="conn-text" style="color:var(--text-dim);">Connecting...</span>
                </div>
            </div>
        </div>

        <!-- QUICK ACTIONS -->
        <div class="actions-grid">
            <a href="deposit.html" class="action-btn dep">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                <span class="action-label">Deposit</span>
            </a>
            <a href="withdraw.html" class="action-btn with">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                <span class="action-label">Withdraw</span>
            </a>
            <a href="trade.html" class="action-btn trade">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                <span class="action-label">Trade</span>
            </a>
            <a href="profile.html" class="action-btn profile">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span class="action-label">Profile</span>
            </a>
        </div>

        <!-- BANNER -->
        <div class="banner">
            <div>
                <div class="banner-title">Stay Informed</div>
                <div class="banner-sub">Latest market updates & platform news</div>
            </div>
            <div class="banner-icon">📡</div>
        </div>

        <!-- SEARCH -->
        <div class="search-wrap">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" id="search-box" placeholder="Search markets...">
        </div>

        <!-- TABS -->
        <div id="tab-container">
            <button class="tab-link active" data-sort="hot">Hot Ranking</button>
            <button class="tab-link" data-sort="gainers">Top Gainers</button>
            <button class="tab-link" data-sort="24h">24H Ranking</button>
        </div>

        <!-- ASSETS -->
        <div id="assets-skeleton">
            <div class="skeleton" style="height:58px; margin-bottom:8px; border-radius:8px;"></div>
            <div class="skeleton" style="height:58px; margin-bottom:8px; border-radius:8px;"></div>
            <div class="skeleton" style="height:58px; margin-bottom:8px; border-radius:8px;"></div>
            <div class="skeleton" style="height:58px; border-radius:8px;"></div>
        </div>
        <div id="assets-content"></div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link" id="nav-dashboard">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span>Home</span>
        </a>
        <a href="trade.html" class="nav-link" id="nav-trade">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span>Trade</span>
        </a>
        <a href="deposit.html" class="nav-link" id="nav-deposit">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span>Deposit</span>
        </a>
        <a href="withdraw.html" class="nav-link" id="nav-withdraw">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H4a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
            <span>Withdraw</span>
        </a>
        <a href="profile.html" class="nav-link" id="nav-profile">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('nav-dashboard').classList.add('active');
        // Add active bar to home nav
        const homeNav = document.getElementById('nav-dashboard');
        const bar = document.createElement('div');
        bar.className = 'nav-active-bar';
        homeNav.appendChild(bar);

        const token = localStorage.getItem('authToken');
        let lastPrices = {};
        let allAssets = [];

        const usernameDisplay = document.getElementById('username-display');
        const balanceDisplay = document.getElementById('balance-display');
        const pnlDisplay = document.getElementById('pnl-display');
        const headerSkeleton = document.getElementById('header-skeleton');
        const headerContent = document.getElementById('header-content');
        const assetsContent = document.getElementById('assets-content');
        const assetsSkeleton = document.getElementById('assets-skeleton');
        const searchBox = document.getElementById('search-box');
        const tabContainer = document.getElementById('tab-container');

        // ===== CONNECTION STATUS =====
        function updateConnectionStatus(status, message) {
            const statusElem = document.getElementById('connection-status');
            if (!statusElem) return;
            const dot = statusElem.querySelector('.conn-dot');
            const text = statusElem.querySelector('.conn-text');
            if (status === 'connected') {
                dot.classList.add('live');
                text.style.color = 'var(--neon)';
                text.textContent = '● LIVE';
            } else if (status === 'disconnected') {
                dot.classList.remove('live');
                text.style.color = 'var(--red)';
                text.textContent = '✕ OFFLINE';
            } else {
                dot.classList.remove('live');
                text.style.color = '#facc15';
                text.textContent = '◌ CONNECTING...';
            }
        }

        // ===== PNL STORAGE =====
        const savePnlToStorage = (v) => {
            localStorage.setItem('todayPnl', v.toString());
            localStorage.setItem('pnlDate', new Date().toDateString());
        };
        const loadPnlFromStorage = () => {
            const today = new Date().toDateString();
            if (localStorage.getItem('pnlDate') === today) {
                return parseFloat(localStorage.getItem('todayPnl')) || 0;
            }
            localStorage.setItem('todayPnl', '0');
            localStorage.setItem('pnlDate', today);
            return 0;
        };

        // ===== RENDER ASSET LIST =====
        const renderAssetList = (assets) => {
            assetsContent.innerHTML = '';
            if (!assets || assets.length === 0) {
                assetsContent.innerHTML = `<p style="text-align:center; color:var(--text-dim); padding:24px; font-size:13px; letter-spacing:0.1em;">NO ASSETS FOUND</p>`;
                return;
            }
            assets.forEach(asset => {
                const changeSign = asset.change >= 0 ? '+' : '';
                const changeClass = asset.change >= 0 ? 'change-up' : 'change-down';
                const tickerBase = asset.ticker.split('/')[0];
                const iconUrl = `/icons/${tickerBase.toLowerCase()}.svg`;

                const row = document.createElement('div');
                row.id = `asset-card-${asset.ticker.replace('/', '-')}`;
                row.className = 'asset-row';
                row.setAttribute('data-name', `${tickerBase.toLowerCase()} ${asset.name.toLowerCase()}`);
                row.setAttribute('data-change', asset.change);
                row.onclick = () => { window.location.href = `trade.html?pair=${asset.ticker}`; };

                row.innerHTML = `
                    <div class="asset-left">
                        <div class="asset-icon-wrap">
                            <div class="asset-icon">
                                <img src="${iconUrl}" alt="${tickerBase}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span>${tickerBase.substring(0,3)}</span>'">
                            </div>
                        </div>
                        <div>
                            <div class="asset-name">${tickerBase}</div>
                            <div class="asset-fullname">${asset.name}</div>
                        </div>
                    </div>
                    <div class="asset-right">
                        <div class="asset-price">${asset.price.toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 5 })}</div>
                        <div class="asset-change ${changeClass}">${changeSign}${asset.change.toFixed(2)}%</div>
                    </div>
                `;
                assetsContent.appendChild(row);
                lastPrices[asset.ticker] = asset.price;
            });
        };

        // ===== RENDER DATA =====
        const renderData = (data) => {
            usernameDisplay.textContent = data.username;
            balanceDisplay.textContent = parseFloat(data.balance).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const serverPnl = data.todayPnl !== undefined ? data.todayPnl : loadPnlFromStorage();
            pnlDisplay.dataset.pnlValue = serverPnl;
            updatePnlDisplay(serverPnl);
            savePnlToStorage(serverPnl);

            allAssets = data.assets || [];
            renderAssetList(allAssets);

            headerSkeleton.style.display = 'none';
            headerContent.style.display = 'block';
            assetsSkeleton.style.display = 'none';
        };

        // ===== UPDATE PNL DISPLAY =====
        const updatePnlDisplay = (pnlValue) => {
            const pnlNumber = parseFloat(pnlValue);
            const pnlValueElem = pnlDisplay.querySelector('.value');
            const arrow = pnlDisplay.querySelector('.pnl-arrow');

            pnlValueElem.style.color = pnlNumber > 0 ? 'var(--neon)' : pnlNumber < 0 ? 'var(--red)' : '#64748b';
            arrow.style.color = pnlNumber > 0 ? 'var(--neon)' : pnlNumber < 0 ? 'var(--red)' : '#64748b';

            const prefix = pnlNumber > 0 ? '+' : '';
            pnlValueElem.textContent = prefix + pnlNumber.toLocaleString('en-US', { style: 'currency', currency: 'USD' });

            pnlDisplay.classList.remove('pnl-update');
            void pnlDisplay.offsetWidth;
            pnlDisplay.classList.add('pnl-update');
        };

        // ===== SOCKET.IO =====
        const socket = io({
            auth: { token },
            transports: ['websocket', 'polling'],
            pingInterval: 10000,
            pingTimeout: 15000,
            reconnectionDelay: 5000,
            reconnectionDelayMax: 10000
        });

        socket.on('connect', () => {
            updateConnectionStatus('connected', 'LIVE');
            socket.emit('request_dashboard_data');
        });
        socket.on('disconnect', (reason) => {
            updateConnectionStatus('disconnected', 'OFFLINE');
        });
        socket.on('connect_error', (error) => {
            updateConnectionStatus('error', 'FAILED');
            if (error.message.includes('auth') || error.message.includes('Authentication') || error.message.includes('token')) {
                setTimeout(() => window.location.href = '/login.html', 2000);
            }
        });

        socket.on('dashboard_data', (data) => {
            if (data && data.success) {
                renderData(data.data);
            } else {
                assetsContent.innerHTML = `<div style="text-align:center; padding:24px; color:var(--red); font-size:13px; letter-spacing:0.1em;">FAILED TO LOAD DATA</div>`;
            }
        });

        socket.on('dashboard_price_update', (updates) => {
            allAssets.forEach(asset => {
                if (updates[asset.ticker]) {
                    asset.price = updates[asset.ticker].price;
                    asset.change = updates[asset.ticker].change;
                }
            });
            for (const ticker in updates) {
                const cardId = `asset-card-${ticker.replace('/', '-')}`;
                const row = document.getElementById(cardId);
                if (!row) continue;

                const newPrice = updates[ticker].price;
                const newChange = updates[ticker].change;
                const priceElem = row.querySelector('.asset-price');
                const changeElem = row.querySelector('.asset-change');

                row.setAttribute('data-change', newChange);

                if (lastPrices[ticker] !== undefined && newPrice !== lastPrices[ticker]) {
                    row.classList.remove('price-up', 'price-down');
                    void row.offsetWidth;
                    row.classList.add(newPrice > lastPrices[ticker] ? 'price-up' : 'price-down');
                }

                priceElem.textContent = newPrice.toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 5 });
                const cs = newChange >= 0 ? '+' : '';
                changeElem.textContent = `${cs}${newChange.toFixed(2)}%`;
                changeElem.className = `asset-change ${newChange >= 0 ? 'change-up' : 'change-down'}`;
                lastPrices[ticker] = newPrice;
            }
        });

        socket.on('trade_result', (data) => {
            try {
                if (data.balance !== undefined && !isNaN(data.balance)) {
                    balanceDisplay.textContent = parseFloat(data.balance).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    balanceDisplay.classList.remove('pnl-update');
                    void balanceDisplay.offsetWidth;
                    balanceDisplay.classList.add('pnl-update');
                }
                let newPnl = (data.todayPnl !== undefined && !isNaN(data.todayPnl)) ? data.todayPnl : loadPnlFromStorage();
                pnlDisplay.dataset.pnlValue = newPnl;
                updatePnlDisplay(newPnl);
                savePnlToStorage(newPnl);
            } catch (e) { console.error('trade_result error:', e); }
        });

        socket.on('pnl_update', (data) => {
            if (data.todayPnl !== undefined && !isNaN(data.todayPnl)) {
                pnlDisplay.dataset.pnlValue = data.todayPnl;
                updatePnlDisplay(data.todayPnl);
                savePnlToStorage(data.todayPnl);
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) socket.emit('request_dashboard_data');
        });
        setInterval(() => socket.emit('request_dashboard_data'), 30000);

        const initialPnl = loadPnlFromStorage();
        if (initialPnl !== 0) {
            pnlDisplay.dataset.pnlValue = initialPnl;
            updatePnlDisplay(initialPnl);
        }

        // ===== SEARCH =====
        searchBox.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.asset-row').forEach(row => {
                row.style.display = row.getAttribute('data-name').includes(q) ? 'flex' : 'none';
            });
        });

        // ===== TABS =====
        tabContainer.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') return;
            tabContainer.querySelector('.active').classList.remove('active');
            e.target.classList.add('active');

            const sortType = e.target.getAttribute('data-sort');
            let sorted = [...allAssets];
            if (sortType === 'gainers') {
                sorted.sort((a, b) => b.change - a.change);
            }
            renderAssetList(sorted);

            const currentQ = searchBox.value.toLowerCase();
            if (currentQ) {
                document.querySelectorAll('.asset-row').forEach(row => {
                    if (!row.getAttribute('data-name').includes(currentQ)) row.style.display = 'none';
                });
            }
        });
    });
    </script>
</body>
</html>
